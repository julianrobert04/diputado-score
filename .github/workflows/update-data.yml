name: Actualización semanal de datos

on:
  schedule:
    # Lunes 12:00 UTC (6:00 am Costa Rica)
    - cron: "0 12 * * 1"
  workflow_dispatch:

# Empuja el commit de datos: necesita escritura al repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Acciones pineadas a SHA completo (endurecimiento de cadena de suministro).
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # actions/setup-node@v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Descargar datos abiertos y clasificar noticias
        run: npm run ingest:opendata
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # AUDITOR (KTD 2): valida el archivo de forma independiente ANTES del
      # commit. Si falla, el job queda en rojo (visible en la pestaña Actions)
      # y no se commitea nada.
      - name: Validar datos antes de commitear
        run: npx tsx src/scripts/validate-data.ts

      - name: Commit y push si hay datos nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Diff normalizado: enmascarar TODO campo de timestamp ("...UpdatedAt")
          # a una constante en AMBAS copias (la versión en HEAD y la recién
          # generada) para que un cambio de timestamp por sí solo NO cuente como
          # cambio real. git diff no puede excluir un campo, así que comparamos
          # copias enmascaradas. El regex captura cualquier "...UpdatedAt" (p.ej.
          # `updatedAt` Y `medUpdatedAt`, este último se reescribe con new Date()
          # en toda corrida con ANTHROPIC_API_KEY): si solo se mascara `updatedAt`,
          # `medUpdatedAt` deja el diff siempre distinto y el corto-circuito nunca
          # dispara en producción.
          MASK='s/"\([A-Za-z]*[Uu]pdatedAt\)": *"[^"]*"/"\1":"__MASKED__"/g'
          git show HEAD:data/real-data.json | sed "$MASK" > /tmp/old-data.json
          sed "$MASK" data/real-data.json > /tmp/new-data.json
          if diff -q /tmp/old-data.json /tmp/new-data.json >/dev/null; then
            echo "Sin datos nuevos esta semana (solo cambiaron los timestamps updatedAt/medUpdatedAt)"
            exit 0
          fi
          git add data/real-data.json
          git commit -m "data: actualización semanal de datos abiertos de la Asamblea"
          git push
