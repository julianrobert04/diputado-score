name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# lint/typecheck/test/build no necesitan escritura.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # actions/setup-node@v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
